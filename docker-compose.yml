version: "3.9"
services:
  orchestrator:
    build: ./services/orchestrator-service
    ports: ["3001:3001"]
    env_file: .env
    depends_on: [postgres, qdrant]

  trust-layer:
    build: ./services/trust-layer-service
    ports: ["3002:3002"]
    env_file: .env

  knowledge-layer:
    build: ./services/knowledge-layer-service
    ports: ["3003:3003"]
    env_file: .env
    depends_on: [qdrant]

  reporting:
    build: ./services/reporting-service
    ports: ["3004:3004"]
    env_file: .env

  api-gateway:
    build: ./apps/api-gateway
    ports: ["3000:3000"]
    env_file: .env

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: qa_orchestrator
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  pgdata:
  qdrant_storage:
