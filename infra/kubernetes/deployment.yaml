apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app: agentic-qa-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: agentic-qa-orchestrator:latest
          ports:
            - containerPort: 3001
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qa-orchestrator-secrets
                  key: anthropic-api-key
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-svc
spec:
  selector:
    app: orchestrator
  ports:
    - port: 3001
      targetPort: 3001
